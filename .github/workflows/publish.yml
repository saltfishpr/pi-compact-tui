name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Ensure supported npm
        run: npm install --global npm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Verify release version
        run: |
          node -e "
            const version = require('./package.json').version;
            if ('v' + version !== process.env.GITHUB_REF_NAME) {
              throw new Error(
                'Release tag ' + process.env.GITHUB_REF_NAME +
                ' does not match package version v' + version
              );
            }
          "

      - name: Publish
        run: npm publish --access public
